<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <defs>
    <linearGradient id="ssd-hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666"/>
      <stop offset="50%" style="stop-color:#888"/>
      <stop offset="100%" style="stop-color:#555"/>
    </linearGradient>
    <filter id="ssd-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4488ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Main wedge hull - massive Super Star Destroyer -->
  <polygon points="5,60 185,38 195,50 195,70 185,82" fill="url(#ssd-hull)" filter="url(#ssd-glow)"/>
  <!-- Upper surface detail -->
  <polygon points="10,59 185,39 190,50 185,55 50,58" fill="#777"/>
  <!-- Lower surface -->
  <polygon points="10,61 185,81 190,70 185,65 50,62" fill="#666"/>
  <!-- Bridge tower (command structure) -->
  <rect x="155" y="42" width="18" height="8" rx="1" fill="#999"/>
  <rect x="158" y="36" width="12" height="8" rx="1" fill="#aaa"/>
  <polygon points="160,36 168,30 170,36" fill="#bbb"/>
  <!-- Shield generator domes -->
  <circle cx="162" cy="35" r="3" fill="#ccc"/>
  <circle cx="168" cy="35" r="3" fill="#ccc"/>
  <!-- Surface trenches -->
  <line x1="20" y1="59" x2="180" y2="42" stroke="#555" stroke-width="0.8"/>
  <line x1="20" y1="61" x2="180" y2="78" stroke="#555" stroke-width="0.8"/>
  <line x1="50" y1="58" x2="180" y2="48" stroke="#444" stroke-width="0.3"/>
  <line x1="50" y1="62" x2="180" y2="72" stroke="#444" stroke-width="0.3"/>
  <!-- Engine bank -->
  <rect x="185" y="45" width="8" height="6" fill="#555"/>
  <rect x="185" y="53" width="8" height="6" fill="#555"/>
  <rect x="185" y="61" width="8" height="6" fill="#555"/>
  <rect x="185" y="69" width="8" height="6" fill="#555"/>
  <!-- Engine glow -->
  <ellipse cx="195" cy="48" rx="4" ry="3" fill="#4488ff" opacity="0.6"/>
  <ellipse cx="195" cy="56" rx="4" ry="3" fill="#4488ff" opacity="0.6"/>
  <ellipse cx="195" cy="64" rx="4" ry="3" fill="#4488ff" opacity="0.6"/>
  <ellipse cx="195" cy="72" rx="4" ry="3" fill="#4488ff" opacity="0.6"/>
  <!-- Surface detail panels -->
  <rect x="60" y="55" width="15" height="4" rx="1" fill="#777" opacity="0.6"/>
  <rect x="90" y="52" width="20" height="5" rx="1" fill="#777" opacity="0.6"/>
  <rect x="120" y="48" width="18" height="5" rx="1" fill="#777" opacity="0.6"/>
  <!-- Weapon emplacements -->
  <circle cx="40" cy="58" r="1.5" fill="#ff4444" opacity="0.4"/>
  <circle cx="70" cy="56" r="1.5" fill="#ff4444" opacity="0.4"/>
  <circle cx="100" cy="53" r="1.5" fill="#ff4444" opacity="0.4"/>
  <circle cx="130" cy="50" r="1.5" fill="#ff4444" opacity="0.4"/>
</svg>
