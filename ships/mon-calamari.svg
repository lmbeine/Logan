<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <defs>
    <linearGradient id="mc-hull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="50%" style="stop-color:#C49A2A"/>
      <stop offset="100%" style="stop-color:#7A5C10"/>
    </linearGradient>
    <linearGradient id="mc-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4488ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2244aa;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="mc-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4488ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Main hull - organic/bulbous shape -->
  <ellipse cx="100" cy="60" rx="80" ry="30" fill="url(#mc-hull)" filter="url(#mc-shadow)"/>
  <!-- Upper dome -->
  <ellipse cx="90" cy="50" rx="55" ry="20" fill="#B8892A" opacity="0.8"/>
  <!-- Bridge tower -->
  <rect x="55" y="35" width="20" height="15" rx="3" fill="#9A7520"/>
  <rect x="58" y="32" width="14" height="8" rx="2" fill="#AA8530"/>
  <!-- Engine pods - left -->
  <ellipse cx="30" cy="70" rx="18" ry="12" fill="#7A5C10"/>
  <ellipse cx="14" cy="70" rx="6" ry="8" fill="#4488ff" opacity="0.7"/>
  <!-- Engine pods - right -->
  <ellipse cx="170" cy="70" rx="18" ry="12" fill="#7A5C10"/>
  <ellipse cx="186" cy="70" rx="6" ry="8" fill="#4488ff" opacity="0.7"/>
  <!-- Hull details -->
  <line x1="30" y1="60" x2="170" y2="60" stroke="#AA8530" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="55" x2="160" y2="55" stroke="#AA8530" stroke-width="0.5" opacity="0.4"/>
  <line x1="40" y1="65" x2="160" y2="65" stroke="#AA8530" stroke-width="0.5" opacity="0.4"/>
  <!-- Windows -->
  <circle cx="70" cy="55" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="80" cy="52" r="1.5" fill="#88ccff" opacity="0.8"/>
  <circle cx="110" cy="52" r="1.5" fill="#88ccff" opacity="0.8"/>
  <circle cx="120" cy="55" r="2" fill="#88ccff" opacity="0.8"/>
  <circle cx="130" cy="58" r="1.5" fill="#88ccff" opacity="0.6"/>
  <!-- Ventral fin -->
  <polygon points="85,75 100,95 115,75" fill="#8B6914" opacity="0.7"/>
  <!-- Shield glow -->
  <ellipse cx="100" cy="60" rx="85" ry="35" fill="none" stroke="#4488ff" stroke-width="0.5" opacity="0.3"/>
</svg>
