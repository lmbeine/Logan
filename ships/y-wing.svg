<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <defs>
    <linearGradient id="yw-hull" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#aa9944"/>
      <stop offset="50%" style="stop-color:#ccbb66"/>
      <stop offset="100%" style="stop-color:#887733"/>
    </linearGradient>
    <filter id="yw-glow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#ff6644" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Engine nacelles -->
  <!-- Upper nacelle -->
  <rect x="70" y="20" width="90" height="14" rx="4" fill="#887733" stroke="#666" stroke-width="0.5"/>
  <rect x="75" y="22" width="80" height="10" rx="3" fill="#aa9944"/>
  <ellipse cx="163" cy="27" rx="5" ry="7" fill="#ff6644" opacity="0.7"/>
  <ellipse cx="163" cy="27" rx="3" ry="5" fill="#ffaa66" opacity="0.8"/>
  <!-- Lower nacelle -->
  <rect x="70" y="86" width="90" height="14" rx="4" fill="#887733" stroke="#666" stroke-width="0.5"/>
  <rect x="75" y="88" width="80" height="10" rx="3" fill="#aa9944"/>
  <ellipse cx="163" cy="93" rx="5" ry="7" fill="#ff6644" opacity="0.7"/>
  <ellipse cx="163" cy="93" rx="3" ry="5" fill="#ffaa66" opacity="0.8"/>
  <!-- Connecting pylons (Y shape) -->
  <polygon points="55,55 70,27 75,27 60,55" fill="#999"/>
  <polygon points="55,65 70,93 75,93 60,65" fill="#999"/>
  <!-- Main cockpit module -->
  <polygon points="15,52 15,68 65,72 65,48" fill="url(#yw-hull)" filter="url(#yw-glow)"/>
  <!-- Nose/cockpit -->
  <polygon points="5,55 5,65 15,68 15,52" fill="#ccbb66"/>
  <ellipse cx="25" cy="57" rx="8" ry="5" fill="#225588" opacity="0.8"/>
  <ellipse cx="25" cy="57" rx="6" ry="3.5" fill="#3388cc" opacity="0.6"/>
  <!-- Ion cannon turret -->
  <circle cx="40" cy="48" r="4" fill="#ccc" stroke="#999" stroke-width="0.5"/>
  <rect x="38" y="40" width="4" height="8" rx="1" fill="#aaa"/>
  <!-- Hull panel lines -->
  <line x1="20" y1="55" x2="60" y2="52" stroke="#887733" stroke-width="0.5"/>
  <line x1="20" y1="65" x2="60" y2="68" stroke="#887733" stroke-width="0.5"/>
  <!-- Nacelle details -->
  <line x1="80" y1="25" x2="150" y2="25" stroke="#776622" stroke-width="0.5"/>
  <line x1="80" y1="30" x2="150" y2="30" stroke="#776622" stroke-width="0.5"/>
  <line x1="80" y1="91" x2="150" y2="91" stroke="#776622" stroke-width="0.5"/>
  <line x1="80" y1="96" x2="150" y2="96" stroke="#776622" stroke-width="0.5"/>
  <!-- Proton bomb ports -->
  <circle cx="50" cy="68" r="2" fill="#666"/>
  <circle cx="58" cy="69" r="2" fill="#666"/>
</svg>
