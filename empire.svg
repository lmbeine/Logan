<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="empire-glow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#888888" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Galactic Empire cog/gear insignia -->
  <g transform="translate(50,50)" filter="url(#empire-glow)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#999" stroke-width="4"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="20" fill="#999"/>
    <!-- Central hub -->
    <circle cx="0" cy="0" r="8" fill="#bbb"/>
    <circle cx="0" cy="0" r="4" fill="#ddd"/>
    <!-- Six spokes/cog teeth -->
    <!-- Top -->
    <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
    <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    <!-- Top-right -->
    <g transform="rotate(60)">
      <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
      <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    </g>
    <!-- Bottom-right -->
    <g transform="rotate(120)">
      <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
      <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    </g>
    <!-- Bottom -->
    <g transform="rotate(180)">
      <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
      <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    </g>
    <!-- Bottom-left -->
    <g transform="rotate(240)">
      <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
      <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    </g>
    <!-- Top-left -->
    <g transform="rotate(300)">
      <rect x="-4" y="-40" width="8" height="20" rx="1" fill="#999"/>
      <polygon points="-6,-42 0,-48 6,-42" fill="#999"/>
    </g>
  </g>
</svg>
